<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ConvoyGo — Group Fleet Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a; --surface: #111827; --surface2: #1a2235; --surface3: #222d42;
  --accent: #00e5ff; --accent2: #7c3aed; --green: #00e676; --red: #ff1744;
  --amber: #ffd600; --orange: #ff6d00; --text: #f0f4ff; --muted: #6b7a99;
  --border: rgba(255,255,255,0.07); --glow: 0 0 24px rgba(0,229,255,0.18);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; overflow:hidden; }

/* SPLASH */
#splash { position:fixed; inset:0; background:var(--bg); z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:1.5rem; overflow-y:auto; }
.splash-logo { font-family:'Syne',sans-serif; font-size:2.8rem; font-weight:800; color:var(--accent); letter-spacing:-1px; margin-bottom:0.2rem; }
.splash-logo span { color:var(--text); }
.splash-tagline { color:var(--muted); font-size:0.8rem; margin-bottom:2rem; letter-spacing:0.1em; text-transform:uppercase; }
.form-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:1.5rem; width:100%; max-width:420px; }
.form-title { font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; margin-bottom:1.2rem; }
.input-group { margin-bottom:0.85rem; }
.input-group label { font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; display:block; margin-bottom:0.4rem; }
.input-group input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:0.8rem 1rem; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.95rem; outline:none; transition:border-color 0.2s; }
.input-group input:focus { border-color:var(--accent); }
.input-group input::placeholder { color:var(--muted); }
.tabs { display:flex; gap:4px; margin-bottom:1.2rem; background:var(--surface2); border-radius:10px; padding:4px; }
.tab { flex:1; padding:0.55rem; border:none; border-radius:7px; background:transparent; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:0.85rem; cursor:pointer; transition:all 0.2s; }
.tab.active { background:var(--accent); color:#000; font-weight:600; }
.btn-primary { width:100%; padding:0.9rem; border:none; border-radius:12px; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:opacity 0.2s,transform 0.1s; letter-spacing:0.03em; margin-top:0.5rem; }
.btn-primary:active { transform:scale(0.98); opacity:0.9; }

/* APP */
#app { display:none; flex-direction:column; height:100vh; }

/* TOPBAR */
.topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0.6rem 1rem; display:flex; align-items:center; justify-content:space-between; z-index:100; flex-shrink:0; }
.convoy-name { font-family:'Syne',sans-serif; font-weight:700; font-size:0.95rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:140px; }
.my-status { display:flex; align-items:center; gap:0.3rem; font-size:0.75rem; color:var(--green); }
.pulse { width:7px; height:7px; border-radius:50%; background:var(--green); animation:pulse 1.5s infinite; flex-shrink:0; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }
.room-badge { background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:0.25rem 0.7rem; font-size:0.7rem; color:var(--accent); font-weight:700; letter-spacing:0.06em; }
.topbar-actions { display:flex; align-items:center; gap:0.4rem; flex-shrink:0; }
.icon-btn { background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:0.35rem 0.6rem; font-size:0.75rem; cursor:pointer; font-family:'DM Sans',sans-serif; white-space:nowrap; }
.end-btn { background:rgba(255,23,68,0.12); border:1px solid rgba(255,23,68,0.35); color:var(--red); }

/* MAP */
#map { flex:1; position:relative; min-height:0; }
#map-canvas { width:100%; height:100%; }

/* DESTINATION BAR */
#dest-bar { display:none; position:absolute; top:10px; left:50%; transform:translateX(-50%); background:var(--surface); border:1px solid rgba(0,229,255,0.25); border-radius:12px; padding:0.5rem 1rem; z-index:50; white-space:nowrap; box-shadow:var(--glow); font-size:0.8rem; }
#dest-bar .dest-label { color:var(--muted); font-size:0.65rem; text-transform:uppercase; letter-spacing:0.06em; }
#dest-bar .dest-name { color:var(--accent); font-weight:600; }

/* ALERT TOAST */
#alert-toast { position:fixed; top:70px; left:50%; transform:translateX(-50%) translateY(-10px); background:#1a1010; border:1px solid var(--red); border-radius:12px; padding:0.7rem 1.2rem; font-size:0.82rem; color:var(--red); opacity:0; transition:all 0.3s; z-index:500; white-space:nowrap; }
#alert-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* TOAST */
#toast { position:fixed; bottom:calc(45vh + 1rem); left:50%; transform:translateX(-50%) translateY(10px); background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:0.6rem 1.1rem; font-size:0.82rem; opacity:0; transition:all 0.3s; z-index:500; white-space:nowrap; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* BOTTOM PANEL */
.bottom-panel { background:var(--surface); border-top:1px solid var(--border); height:45vh; display:flex; flex-direction:column; flex-shrink:0; }
.panel-header { padding:0.75rem 1rem; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); flex-shrink:0; }
.panel-title { font-family:'Syne',sans-serif; font-weight:700; font-size:0.85rem; }
.car-count { background:var(--accent); color:#000; border-radius:20px; padding:0.1rem 0.55rem; font-size:0.72rem; font-weight:700; }
.dest-eta { font-size:0.72rem; color:var(--muted); }

/* LEADERBOARD */
.leaderboard { overflow-y:auto; flex:1; padding:0 0.75rem 0.75rem; }
.car-item { display:flex; align-items:center; gap:0.6rem; padding:0.65rem 0.6rem; border-radius:10px; margin:0.2rem 0; cursor:pointer; transition:background 0.15s; border:1px solid transparent; position:relative; }
.car-item:active { background:var(--surface2); }
.car-item.leader { border-color:rgba(255,214,0,0.3); background:rgba(255,214,0,0.05); }
.car-item.stopped { border-color:rgba(255,23,68,0.25); background:rgba(255,23,68,0.04); }
.rank-badge { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.65rem; font-weight:800; font-family:'Syne',sans-serif; flex-shrink:0; }
.car-avatar { width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:800; font-size:0.85rem; flex-shrink:0; }
.car-info { flex:1; min-width:0; }
.car-name { font-weight:600; font-size:0.82rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; gap:4px; }
.car-meta { font-size:0.68rem; color:var(--muted); margin-top:1px; display:flex; align-items:center; gap:6px; }
.status-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; display:inline-block; }
.status-online { background:var(--green); }
.status-stopped { background:var(--red); animation:pulse 1s infinite; }
.status-offline { background:var(--muted); }
.car-right { text-align:right; flex-shrink:0; }
.car-dist { font-size:0.78rem; font-weight:700; color:var(--accent); }
.car-eta { font-size:0.65rem; color:var(--muted); margin-top:1px; }
.me-tag { font-size:0.58rem; background:var(--accent2); color:#fff; border-radius:3px; padding:1px 4px; }
.leader-tag { font-size:0.58rem; background:var(--amber); color:#000; border-radius:3px; padding:1px 4px; font-weight:700; }
.stopped-tag { font-size:0.58rem; background:var(--red); color:#fff; border-radius:3px; padding:1px 4px; }
.iamhere-btn { background:rgba(0,230,118,0.12); border:1px solid rgba(0,230,118,0.3); border-radius:8px; color:var(--green); padding:0.25rem 0.5rem; font-size:0.65rem; cursor:pointer; font-family:'DM Sans',sans-serif; white-space:nowrap; flex-shrink:0; }

/* ENDED OVERLAY */
#ended-overlay { display:none; position:fixed; inset:0; background:rgba(10,14,26,0.97); z-index:999; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:2rem; }
#ended-overlay.show { display:flex; }

/* SHARE BTN */
.share-btn { background:rgba(0,230,118,0.1); border:1px solid rgba(0,230,118,0.3); border-radius:20px; color:var(--green); padding:0.25rem 0.7rem; font-size:0.7rem; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; }

/* DEST MARKER PULSE */
@keyframes destPulse {
  0%,100% { transform:scale(1); opacity:1; }
  50% { transform:scale(1.15); opacity:0.85; }
}

/* PLACES AUTOCOMPLETE DROPDOWN FIX */
.pac-container {
  background:var(--surface2) !important;
  border:1px solid rgba(0,229,255,0.3) !important;
  border-radius:12px !important;
  box-shadow:0 8px 32px rgba(0,0,0,0.5) !important;
  font-family:'DM Sans',sans-serif !important;
  margin-top:4px !important;
}
.pac-item {
  background:transparent !important;
  color:var(--text) !important;
  border-top:1px solid rgba(255,255,255,0.05) !important;
  padding:0.55rem 1rem !important;
  font-size:0.85rem !important;
  cursor:pointer !important;
}
.pac-item:hover, .pac-item-selected {
  background:rgba(0,229,255,0.1) !important;
}
.pac-item-query { color:var(--accent) !important; font-weight:600 !important; }
.pac-icon { display:none !important; }
.pac-matched { color:var(--accent) !important; }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo">Convoy<span>Go</span></div>
  <div class="splash-tagline">Professional Fleet Tracker</div>
  <div class="form-card">
    <div class="tabs" id="tab-bar">
      <button class="tab active" onclick="switchTab('join')">Join Convoy</button>
      <button class="tab" id="create-tab" style="display:none" onclick="switchTab('create')">Create New</button>
    </div>

    <div id="join-form">
      <div class="form-title">Join your group 🚗</div>
      <div class="input-group"><label>Your Name</label><input type="text" id="join-name" placeholder="e.g. Khyati Shah" maxlength="20"></div>
      <div class="input-group"><label>Room Code</label><input type="text" id="join-code" placeholder="e.g. SHAH2025" maxlength="10" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()"></div>
      <button class="btn-primary" onclick="joinConvoy()">🚗 Join Convoy</button>
    </div>

    <div id="create-form" style="display:none">
      <div class="form-title">Start a new convoy 🚀</div>
      <div class="input-group"><label>Your Name</label><input type="text" id="create-name" placeholder="e.g. Khyati Shah" maxlength="20"></div>
      <div class="input-group"><label>Convoy Name</label><input type="text" id="create-convoy" placeholder="e.g. Bajipura Trip" maxlength="25"></div>
      <div class="input-group"><label>Room Code (share with group)</label><input type="text" id="create-code" placeholder="e.g. SHAH2025" maxlength="10" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()"></div>
      <div class="input-group"><label>Destination (address ya jagah ka naam)</label><input type="text" id="create-dest" placeholder="e.g. Saputara Hill Station"></div>
      <button class="btn-primary" onclick="createConvoy()">🚀 Start Convoy</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="topbar">
    <div style="min-width:0">
      <div class="convoy-name" id="top-convoy-name">Convoy</div>
      <div class="my-status"><div class="pulse"></div><span id="top-my-name">You</span></div>
    </div>
    <div class="topbar-actions">
      <div class="room-badge" id="top-room-code">----</div>
      <button class="icon-btn share-btn" onclick="shareLink()">Share 🔗</button>
      <button class="icon-btn end-btn" id="end-btn" style="display:none" onclick="confirmEndConvoy()">End 🚫</button>
    </div>
  </div>

  <div id="map">
    <div id="map-canvas"></div>
    <div id="dest-bar">
      <div class="dest-label">📍 Destination</div>
      <div class="dest-name" id="dest-bar-name">—</div>
    </div>
  </div>

  <div class="bottom-panel">
    <div class="panel-header">
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <div class="panel-title">In this Convoy</div>
        <div class="car-count" id="car-count-badge">0</div>
      </div>
      <div class="dest-eta" id="panel-dest-label"></div>
    </div>
    <div class="leaderboard" id="car-list"></div>
  </div>
</div>

<!-- ENDED OVERLAY -->
<div id="ended-overlay">
  <div style="font-size:4rem;margin-bottom:1rem">🏁</div>
  <div style="font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--red);margin-bottom:0.5rem">Convoy Ended</div>
  <div style="color:var(--muted);font-size:0.9rem;margin-bottom:2rem">Trip khatam ho gayi! Safe journey! 🙏</div>
  <button onclick="location.reload()" style="background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#fff;padding:1rem 2rem;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;">New Convoy 🚗</button>
</div>

<div id="alert-toast"></div>
<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
const FIREBASE_URL = "https://car-tracker-6b36e-default-rtdb.asia-southeast1.firebasedatabase.app";
const MAPS_KEY = "AIzaSyBvT8g8YDIZHQPJEBuXZOjSfEnOggpYanM";

firebase.initializeApp({ databaseURL: FIREBASE_URL });
const db = firebase.database();

let myId = 'u_' + Math.random().toString(36).substr(2,9);
let myName = '', roomCode = '', convoyName = '', destination = '';
let myLat = null, myLng = null;
let members = {}, markers = {}, trailPolyline = null;
let map = null, geocoder = null, destMarker = null;
let directionsService = null, directionsRenderer = null;
let isAdmin = false, watchId = null;
let stoppedAlerts = {};
let leadCarId = null;
let trailPath = [];
let destPlaceId = null, destLatLng = null, destAutocomplete = null;

// ===== ADMIN CHECK =====
window.addEventListener('DOMContentLoaded', () => {
  isAdmin = new URLSearchParams(window.location.search).get('admin') === 'true';
  if (isAdmin) {
    document.getElementById('create-tab').style.display = 'block';
    // Autocomplete uses Nominatim - no Maps API needed, init immediately
    initDestinationAutocomplete();
    // Load Maps early for faster map render when convoy starts
    loadGoogleMapsEarly();
  }
});

function loadGoogleMapsEarly() {
  if (window.google && google.maps) return;
  const s = document.createElement('script');
  s.src = `https://maps.googleapis.com/maps/api/js?key=${MAPS_KEY}&libraries=geometry&callback=onMapsEarlyLoad`;
  s.async = true;
  s.onerror = () => {};
  document.head.appendChild(s);
}

window.onMapsEarlyLoad = function() {
  // Maps preloaded for faster start - no Places needed
};

function initDestinationAutocomplete() {
  const input = document.getElementById('create-dest');
  if (!input) return;

  let dropdown = document.getElementById('dest-dropdown');
  if (!dropdown) {
    dropdown = document.createElement('div');
    dropdown.id = 'dest-dropdown';
    dropdown.style.cssText = `
      position:absolute; z-index:9999; background:#1a2235; border:1px solid rgba(0,229,255,0.3);
      border-radius:12px; box-shadow:0 8px 32px rgba(0,0,0,0.6); width:100%;
      max-height:220px; overflow-y:auto; display:none; margin-top:4px;
      font-family:'DM Sans',sans-serif;
    `;
    input.parentNode.style.position = 'relative';
    input.parentNode.appendChild(dropdown);
  }

  let debounceTimer;
  input.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    const val = input.value.trim();
    if (val.length < 3) { dropdown.style.display = 'none'; return; }
    debounceTimer = setTimeout(() => fetchSuggestions(val, dropdown, input), 400);
  });
  input.addEventListener('blur', () => setTimeout(() => dropdown.style.display = 'none', 200));
}

function fetchSuggestions(query, dropdown, input) {
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query + ', India')}&format=json&limit=6`;
  fetch(url, { headers: { 'Accept-Language': 'en' } })
    .then(r => r.json())
    .then(results => {
      dropdown.innerHTML = '';
      if (!results.length) { dropdown.style.display = 'none'; return; }
      results.forEach(r => {
        const item = document.createElement('div');
        item.style.cssText = 'padding:10px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.05);';
        const name = r.name || r.display_name.split(',')[0];
        const sub = r.display_name.substring(0, 65);
        item.innerHTML = `<div style="font-weight:600;font-size:0.85rem;color:#00e5ff">${name}</div>
          <div style="font-size:0.7rem;color:#6b7a99;margin-top:2px">${sub}...</div>`;
        item.addEventListener('mouseover', () => item.style.background = 'rgba(0,229,255,0.08)');
        item.addEventListener('mouseout', () => item.style.background = 'transparent');
        item.addEventListener('mousedown', () => {
          input.value = name;
          destination = name;
          destLatLng = { lat: parseFloat(r.lat), lng: parseFloat(r.lon) };
          dropdown.style.display = 'none';
        });
        dropdown.appendChild(item);
      });
      dropdown.style.display = 'block';
    })
    .catch(() => dropdown.style.display = 'none');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('join-form').style.display = tab === 'join' ? 'block' : 'none';
  document.getElementById('create-form').style.display = tab === 'create' ? 'block' : 'none';
}

// ===== CREATE / JOIN =====
function createConvoy() {
  myName = document.getElementById('create-name').value.trim();
  convoyName = document.getElementById('create-convoy').value.trim();
  roomCode = document.getElementById('create-code').value.trim().toUpperCase();
  destination = document.getElementById('create-dest').value.trim();
  if (!myName || !convoyName || !roomCode) { showToast('Sab fields bharo!'); return; }
  const convoyData = { 
    name: convoyName, 
    destination: destination || '', 
    status: 'active', 
    createdAt: Date.now()
  };
  if (destLatLng) {
    convoyData.destLat = destLatLng.lat;
    convoyData.destLng = destLatLng.lng;
  }
  db.ref('convoys/' + roomCode).set(convoyData);
  startApp();
}

function joinConvoy() {
  myName = document.getElementById('join-name').value.trim();
  roomCode = document.getElementById('join-code').value.trim().toUpperCase();
  if (!myName || !roomCode) { showToast('Naam aur room code dono bharo!'); return; }
  db.ref('convoys/' + roomCode).once('value').then(snap => {
    const data = snap.val() || {};
    convoyName = data.name || roomCode + ' Convoy';
    destination = data.destination || '';
    if (data.destLat && data.destLng) {
      destLatLng = { lat: data.destLat, lng: data.destLng };
    }
    startApp();
    // If map already loaded (race condition), place marker now
    if (map && destination) setTimeout(geocodeDestination, 500);
  });
}

function startApp() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('top-convoy-name').textContent = convoyName;
  document.getElementById('top-my-name').textContent = myName;
  document.getElementById('top-room-code').textContent = roomCode;
  if (isAdmin) document.getElementById('end-btn').style.display = 'block';
  if (destination) {
    document.getElementById('dest-bar').style.display = 'block';
    document.getElementById('dest-bar-name').textContent = destination;
    document.getElementById('panel-dest-label').textContent = '📍 ' + destination;
  }
  loadGoogleMaps();
  startGPS();
  listenMembers();
  listenConvoyStatus();
}

// ===== GOOGLE MAPS =====
function loadGoogleMaps() {
  if (window.google && google.maps.Map) {
    initMap();
    return;
  }
  const s = document.createElement('script');
  s.src = `https://maps.googleapis.com/maps/api/js?key=${MAPS_KEY}&libraries=geometry&callback=initMap`;
  s.async = true;
  document.head.appendChild(s);
}

window.initMap = function() {
  map = new google.maps.Map(document.getElementById('map-canvas'), {
    center: { lat: 21.1702, lng: 72.8311 },
    zoom: 13,
    disableDefaultUI: true,
    zoomControl: true,
    styles: [
      {elementType:'geometry',stylers:[{color:'#0d1520'}]},
      {elementType:'labels.text.fill',stylers:[{color:'#6b7a99'}]},
      {elementType:'labels.text.stroke',stylers:[{color:'#0d1520'}]},
      {featureType:'road',elementType:'geometry',stylers:[{color:'#1a2235'}]},
      {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#1e3a5f'}]},
      {featureType:'water',elementType:'geometry',stylers:[{color:'#060d18'}]},
      {featureType:'poi',stylers:[{visibility:'off'}]},
      {featureType:'transit',stylers:[{visibility:'off'}]},
    ]
  });
  geocoder = new google.maps.Geocoder();
  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer({
    suppressMarkers: true,
    polylineOptions: { strokeColor:'#00e5ff', strokeOpacity:0.7, strokeWeight:5 }
  });
  directionsRenderer.setMap(map);

  trailPolyline = new google.maps.Polyline({
    path: [],
    geodesic: true,
    strokeColor: '#00e5ff',
    strokeOpacity: 0.85,
    strokeWeight: 5,
    map: map,
    icons: [{
      icon: { path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale: 3, fillColor:'#00e5ff', fillOpacity:1, strokeWeight:0 },
      offset: '100%',
      repeat: '80px'
    }]
  });

  if (destination) geocodeDestination();
  // Autocomplete already initialized in loadGoogleMapsEarly for admin
  // For non-admin joining, no autocomplete needed
};

function geocodeDestination() {
  function placeDestMarker(pos) {
    if (destMarker) destMarker.setMap(null); // remove old if exists

    // Use Google Maps built-in symbol path - most reliable across all browsers
    destMarker = new google.maps.Marker({
      position: pos,
      map,
      icon: {
        path: 'M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z',
        fillColor: '#FF3B30',
        fillOpacity: 1,
        strokeColor: '#ffffff',
        strokeWeight: 2,
        scale: 2.2,
        anchor: new google.maps.Point(12, 22),
      },
      title: destination,
      zIndex: 1000,
      animation: google.maps.Animation.DROP
    });

    const infoWindow = new google.maps.InfoWindow({
      content: `<div style="font-family:sans-serif;padding:6px 4px;min-width:120px">
        <div style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:2px">Destination</div>
        <div style="font-weight:700;font-size:14px;color:#111">${destination}</div>
      </div>`
    });

    infoWindow.open(map, destMarker);
    setTimeout(() => infoWindow.close(), 3500);
    destMarker.addListener('click', () => infoWindow.open(map, destMarker));
    map.panTo(pos);
  }

  if (destLatLng) {
    placeDestMarker(new google.maps.LatLng(destLatLng.lat, destLatLng.lng));
  } else {
    geocoder.geocode({ address: destination + ', India' }, (results, status) => {
      if (status === 'OK' && results[0]) {
        const pos = results[0].geometry.location;
        destLatLng = { lat: pos.lat(), lng: pos.lng() };
        placeDestMarker(pos);
      } else {
        showToast('Destination location nahi mili: ' + status);
      }
    });
  }
}

// ===== GPS =====
function startGPS() {
  if (!navigator.geolocation) { showToast('GPS available nahi!'); return; }
  watchId = navigator.geolocation.watchPosition(pos => {
    myLat = pos.coords.latitude;
    myLng = pos.coords.longitude;
    pushMyLocation();
  }, err => {}, { enableHighAccuracy: true, maximumAge: 3000, timeout: 15000 });
}

function pushMyLocation() {
  db.ref('convoys/' + roomCode + '/members/' + myId).set({
    name: myName, lat: myLat, lng: myLng, ts: Date.now(), online: true
  });
  db.ref('convoys/' + roomCode + '/members/' + myId + '/online').onDisconnect().set(false);
}

// ===== LISTEN MEMBERS =====
function listenMembers() {
  db.ref('convoys/' + roomCode + '/members').on('value', snap => {
    members = snap.val() || {};
    updateLeaderboard();
    updateMapMarkers();
    checkStoppedCars();
    updateLeadTrail();
  });
}

function listenConvoyStatus() {
  db.ref('convoys/' + roomCode + '/status').on('value', snap => {
    if (snap.val() === 'ended') document.getElementById('ended-overlay').classList.add('show');
  });
}

const COLORS = ['#00e5ff','#7c3aed','#00e676','#ffd600','#ff6d00','#e040fb','#ff5252','#00bcd4','#69f0ae','#ffab40','#f06292','#80cbc4'];
function getColor(id) {
  const ids = Object.keys(members).sort();
  return COLORS[ids.indexOf(id) % COLORS.length];
}

// ===== LEADERBOARD =====
function updateLeaderboard() {
  const list = document.getElementById('car-list');
  const count = Object.keys(members).length;
  document.getElementById('car-count-badge').textContent = count;

  // Sort by distance to destination (if set) else by last update
  let sorted = Object.entries(members).map(([id, m]) => {
    let distToDest = null;
    const dp = destLatLng || (destMarker ? { lat: destMarker.getPosition().lat(), lng: destMarker.getPosition().lng() } : null);
    if (dp && m.lat) {
      distToDest = getDistance(m.lat, m.lng, dp.lat, dp.lng);
    }
    return { id, m, distToDest };
  });

  if (sorted.some(x => x.distToDest !== null)) {
    sorted.sort((a, b) => (a.distToDest || 999) - (b.distToDest || 999));
  }

  // Lead car = first in sorted list
  leadCarId = sorted.length > 0 ? sorted[0].id : null;

  list.innerHTML = '';
  sorted.forEach(({ id, m, distToDest }, index) => {
    const isMe = id === myId;
    const isLeader = index === 0 && count > 1;
    const online = m.online !== false && (Date.now() - m.ts) < 25000;
    const isStopped = !isMe && online && (Date.now() - m.ts) < 25000 && stoppedAlerts[id];
    const color = getColor(id);
    const initials = m.name.split(' ').map(w => w[0]).join('').toUpperCase().substr(0, 2);
    const distMyToThem = (myLat && m.lat && !isMe) ? getDistance(myLat, myLng, m.lat, m.lng) : null;
    const rank = index + 1;
    const rankEmoji = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `${rank}.`;

    let etaText = '';
    if (distToDest !== null) {
      const speed = 40;
      const etaMins = Math.round(distToDest / speed * 60);
      etaText = distToDest < 0.1 ? '✅ Arrived!' : etaMins < 60 ? `ETA ${etaMins} min` : `ETA ${(etaMins/60).toFixed(1)} hr`;
    }

    const div = document.createElement('div');
    div.className = 'car-item' + (isLeader ? ' leader' : '') + (isStopped ? ' stopped' : '');
    div.innerHTML = `
      <div class="rank-badge" style="background:${color}22;color:${color}">${rankEmoji}</div>
      <div class="car-avatar" style="background:${color}22;color:${color}">${initials}</div>
      <div class="car-info">
        <div class="car-name">
          ${m.name}
          ${isMe ? '<span class="me-tag">ME</span>' : ''}
          ${isLeader && !isMe ? '<span class="leader-tag">LEAD</span>' : ''}
          ${isStopped ? '<span class="stopped-tag">STOPPED</span>' : ''}
        </div>
        <div class="car-meta">
          <span class="status-dot ${isStopped ? 'status-stopped' : online ? 'status-online' : 'status-offline'}"></span>
          ${online ? (isStopped ? 'Ruk gayi!' : 'Live') : 'Offline'}
          ${distToDest !== null ? `· ${formatDist(distToDest)} to dest` : ''}
        </div>
      </div>
      <div class="car-right">
        ${distMyToThem !== null ? `<div class="car-dist">${formatDist(distMyToThem)}</div>` : ''}
        ${etaText ? `<div class="car-eta">${etaText}</div>` : ''}
        ${isMe ? `<button class="iamhere-btn" onclick="iAmHere()">📍 I'm Here</button>` : ''}
      </div>
    `;
    if (m.lat && !isMe) div.onclick = () => map && map.panTo({ lat: m.lat, lng: m.lng });
    list.appendChild(div);
  });
}

// ===== MAP MARKERS =====
function updateMapMarkers() {
  if (!map) return;
  const bounds = new google.maps.LatLngBounds();
  let hasPoints = false;

  Object.entries(members).forEach(([id, m]) => {
    if (!m.lat || !m.lng) return;
    hasPoints = true;
    const color = getColor(id);
    const isMe = id === myId;
    const isLeader = id === leadCarId && Object.keys(members).length > 1;
    const pos = { lat: m.lat, lng: m.lng };

    const carIcon = {
      url: `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="52" height="62" viewBox="0 0 52 62">
          <rect x="2" y="2" width="48" height="32" rx="10" fill="${color}" stroke="white" stroke-width="${isMe ? 3 : 2}"/>
          ${isLeader ? '<rect x="0" y="0" width="52" height="36" rx="10" fill="none" stroke="#ffd600" stroke-width="2.5"/>' : ''}
          <text x="26" y="24" text-anchor="middle" font-size="22" font-family="Arial">🚗</text>
          <rect x="0" y="36" width="52" height="24" rx="7" fill="${color}" opacity="0.95"/>
          <text x="26" y="52" text-anchor="middle" font-size="11" font-family="Arial" font-weight="bold" fill="white">${m.name.split(' ')[0].substring(0,7)}</text>
        </svg>`)}`,
      scaledSize: new google.maps.Size(52, 62),
      anchor: new google.maps.Point(26, 31)
    };

    if (markers[id]) {
      markers[id].setPosition(pos);
      markers[id].setIcon(carIcon);
    } else {
      markers[id] = new google.maps.Marker({ position: pos, map, icon: carIcon, title: m.name, zIndex: isMe ? 999 : isLeader ? 998 : 1 });
    }
    bounds.extend(pos);
  });

  if (hasPoints && Object.keys(members).length > 1) {
    if (destLatLng) bounds.extend(new google.maps.LatLng(destLatLng.lat, destLatLng.lng));
    else if (destMarker) bounds.extend(destMarker.getPosition());
    map.fitBounds(bounds, { top: 80, bottom: 20, left: 20, right: 20 });
  }
}

// ===== LEAD CAR TRAIL =====
function updateLeadTrail() {
  if (!map || !trailPolyline || !leadCarId) return;
  const leader = members[leadCarId];
  if (!leader || !leader.lat) return;

  // Add current position to trail
  const pos = { lat: leader.lat, lng: leader.lng };
  const path = trailPolyline.getPath();

  // Only add if moved enough
  if (path.getLength() === 0) {
    path.push(new google.maps.LatLng(pos.lat, pos.lng));
  } else {
    const last = path.getAt(path.getLength() - 1);
    const dist = getDistance(last.lat(), last.lng(), pos.lat, pos.lng);
    if (dist > 0.01) { // 10m minimum
      path.push(new google.maps.LatLng(pos.lat, pos.lng));
      // Keep last 50 points
      if (path.getLength() > 50) path.removeAt(0);
    }
  }
}

// ===== STOPPED CAR DETECTION =====
let prevPositions = {};
function checkStoppedCars() {
  const now = Date.now();
  Object.entries(members).forEach(([id, m]) => {
    if (id === myId || !m.lat) return;
    const prev = prevPositions[id];
    if (prev) {
      const dist = getDistance(prev.lat, prev.lng, m.lat, m.lng);
      const timeDiff = (now - prev.ts) / 1000 / 60; // minutes
      if (dist < 0.05 && timeDiff > 2) { // moved < 50m in 2 min
        if (!stoppedAlerts[id]) {
          stoppedAlerts[id] = true;
          showAlert(`🚨 ${m.name} ki gadi ruk gayi!`);
        }
      } else {
        stoppedAlerts[id] = false;
      }
    }
    prevPositions[id] = { lat: m.lat, lng: m.lng, ts: now };
  });
}

// ===== I AM HERE =====
function iAmHere() {
  if (!myLat) { showToast('GPS location nahi mili!'); return; }
  const mapsLink = `https://maps.google.com/?q=${myLat},${myLng}`;
  const text = `📍 Main yahan hoon!\n${myName} ki location:\n${mapsLink}\nConvoy: ${roomCode}`;
  if (navigator.share) {
    navigator.share({ title: 'My Location', text });
  } else {
    navigator.clipboard.writeText(text);
    showToast('Location copied! WhatsApp pe bhejo 📋');
  }
}

// ===== END CONVOY =====
function confirmEndConvoy() {
  if (confirm('Convoy end karna chahte ho? Sab ke phone pe trip khatam ho jayegi!')) {
    db.ref('convoys/' + roomCode + '/status').set('ended');
    document.getElementById('ended-overlay').classList.add('show');
  }
}

// ===== SHARE =====
function shareLink() {
  const url = window.location.origin + window.location.pathname;
  const text = `ConvoyGo mein join karo! 🚗\nConvoy: *${convoyName}*\nRoom Code: *${roomCode}*\n${destination ? 'Destination: ' + destination + '\n' : ''}App: ${url}`;
  if (navigator.share) {
    navigator.share({ title: 'ConvoyGo', text });
  } else {
    navigator.clipboard.writeText(text);
    showToast('Link copied! WhatsApp pe bhejo 📋');
  }
}

// ===== UTILS =====
function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDist(km) {
  return km < 1 ? Math.round(km*1000) + ' m' : km.toFixed(1) + ' km';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function showAlert(msg) {
  const t = document.getElementById('alert-toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 5000);
}

window.addEventListener('beforeunload', () => {
  if (roomCode && myId) db.ref('convoys/' + roomCode + '/members/' + myId + '/online').set(false);
});
</script>
